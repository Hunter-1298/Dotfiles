# Terminal & server
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -ga terminal-overrides ",*256col*:Tc"
set -g extended-keys on
set -g extended-keys-format csi-u
set -g history-limit 100000

# Unbind defaults (and stale bindings from older configs) we override below
unbind %
unbind '"'
unbind [
unbind h
unbind n
unbind v
unbind j
unbind k
unbind l

# Splits — h = horizontal (side-by-side), n = new (top/bottom). Both open in $PWD.
bind h split-window -h -c "#{pane_current_path}"
bind n split-window -v -c "#{pane_current_path}"

# Resize panes (prefix + repeated H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle zoom with 'm'
bind -r m resize-pane -Z

# Launch pi-monitor with Shift+M
bind M run-shell 'pi-monitor'

# Enable mouse support (resize and select with the mouse)
set -g mouse on

# Vi-style copy mode
set-window-option -g mode-keys vi

# Enter copy-mode with prefix+v
bind v copy-mode -e

# Vim-style selection inside copy mode + Esc to cancel
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Yank to Windows clipboard (WSL) — replaces stock copy-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'clip.exe'
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'clip.exe'

# Paste from Windows clipboard with prefix+p
bind p run-shell "powershell.exe -command 'Get-Clipboard' | head -c -1 | tmux load-buffer - && tmux paste-buffer"

# Scroll the focused pane like the mouse wheel does
# Alt+j/k anywhere → enter copy-mode and scroll. Inside copy-mode, M-j/M-k scroll directly.
bind -n M-k copy-mode -e \; send-keys -X scroll-up
bind -n M-j copy-mode -e \; send-keys -X scroll-down
bind -T copy-mode-vi M-k send-keys -X scroll-up
bind -T copy-mode-vi M-j send-keys -X scroll-down

# Pane border titles (visible at the top of every pane)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "
set -g allow-set-title off
bind-key N command-prompt -p "Pane name:" "select-pane -T '%%'"

# Plugin Manager setup using TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# List of Tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'   # vim/tmux nav via Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect'      # Persist tmux sessions after a restart
set -g @plugin 'tmux-plugins/tmux-continuum'      # Auto-save sessions every 15 minutes

# ---------------------------------------------------------------------------
# Status line — Tokyo Night palette, matched to pi-monitor + pi coding agent
# ---------------------------------------------------------------------------
# Palette mirrors ts/src/tui/colors.ts in pi-monitor:
#   ACCENT           #7aa2f7   FOREGROUND   #c0caf5   FOREGROUND_MUTED #9aa5ce
#   working (green)  #9ece6a   idle (yellow)#e0af68   error (red)      #f7768e
#   retrying (cyan)  #7dcfff   waiting (orng)#ff9e64  no_pi (inactive) #414868
# bar background is Tokyo Night bg #1a1b26 so #7aa2f7 reads as a hot accent.

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Bar background + default text
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: session name on accent, then a powerline chevron into the bar bg
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26] "

# Right: pi-monitor session state · user@host · date · time
# `#{@pi-monitor-status}` is set by pi-monitor when running; empty otherwise.
set -g status-right-length 140
set -g status-right "#{@pi-monitor-status} #[fg=#414868]│#[fg=#7dcfff,bg=#1a1b26] #(whoami)@#h #[fg=#414868]│#[fg=#9aa5ce] %Y-%m-%d #[fg=#414868]│#[fg=#7aa2f7,bold] %H:%M "

# Window list
set -g window-status-separator ""
set -g window-status-format         "#[fg=#9aa5ce,bg=#1a1b26] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"
set -g window-status-bell-style     "fg=#f7768e,bg=#1a1b26,bold"

# Pane borders track the accent so the active pane pops
set -g pane-border-style        "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Command prompt + copy-mode messages
set -g message-style          "fg=#1a1b26,bg=#7aa2f7,bold"
set -g message-command-style  "fg=#c0caf5,bg=#414868"
set -g mode-style             "fg=#1a1b26,bg=#ff9e64,bold"

# Clock (prefix + t)
set -g clock-mode-colour "#7aa2f7"

# Tmux resurrect settings
set -g @resurrect-capture-pane-contents 'on'  # Capture pane contents for tmux-resurrect
set -g @continuum-restore 'on'                # Enable auto-restore with tmux-continuum

# Initialize Tmux Plugin Manager (must stay at the bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
