# Set terminal type for 256-color support
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Unbind default split-window keys and assign new ones
unbind %
unbind '"'
unbind h   # Unbind the default action of 'h' (pane navigation)

# Assign 'h' to horizontal split and 'v' to vertical split
bind n split-window -h   # Horizontal split with 'h'
bind v split-window -v   # Vertical split with 'v'

# Resize panes with vim-style keys (j/k/l/h)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind h split-window -v   # Vertical split (top/bottom) with 'h'

# Toggle zoom with 'm'
bind -r m resize-pane -Z

# Launch pi-monitor with Shift+M
bind M run-shell 'pi-monitor'

# Enable mouse support (to resize and select with the mouse)
set -g mouse on

# Set vi-mode keybindings for copy mode
set-window-option -g mode-keys vi

# Custom keybindings for copy mode (vim-style selection)
bind-key -T copy-mode-vi 'v' send -X begin-selection   # Start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection    # Copy text with "y"
unbind -T copy-mode-vi MouseDragEnd1Pane  # Don't exit copy mode after dragging with mouse

# Plugin Manager setup using TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# List of Tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'   # For navigating between panes and vim/nvim using Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-resurrect'       # Persist tmux sessions after a restart
set -g @plugin 'tmux-plugins/tmux-continuum'       # Automatically save sessions every 15 minutes

# ---------------------------------------------------------------------------
# Status line — Tokyo Night palette, matched to pi-monitor + pi coding agent
# ---------------------------------------------------------------------------
# Palette mirrors ts/src/tui/colors.ts in pi-monitor (Tokyo Night-style),
# and reads cleanly next to the pi coding agent default dark theme.
#   bg     #1a1b26   accent #7aa2f7   fg     #c0caf5   muted  #9aa5ce
#   sel    #3b4261   green  #9ece6a   yellow #e0af68   red    #f7768e
#   cyan   #7dcfff   orange #ff9e64

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Bar background + default text
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: session name on accent, then a powerline chevron into the bar bg
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26] "

# Right: user@host (cyan) · date (muted) · time (accent)
set -g status-right-length 80
set -g status-right "#[fg=#7dcfff,bg=#1a1b26] #(whoami)@#h #[fg=#3b4261]│#[fg=#9aa5ce] %Y-%m-%d #[fg=#3b4261]│#[fg=#7aa2f7,bold] %H:%M "

# Window list
set -g window-status-separator ""
set -g window-status-format         "#[fg=#9aa5ce,bg=#1a1b26] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"
set -g window-status-bell-style     "fg=#f7768e,bg=#1a1b26,bold"

# Pane borders track the accent so the active pane pops
set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Command prompt + copy-mode messages
set -g message-style          "fg=#1a1b26,bg=#7aa2f7,bold"
set -g message-command-style  "fg=#c0caf5,bg=#3b4261"
set -g mode-style             "fg=#1a1b26,bg=#ff9e64,bold"

# Clock (prefix + t)
set -g clock-mode-colour "#7aa2f7"

# Tmux resurrect settings
set -g @resurrect-capture-pane-contents 'on'  # Capture pane contents for tmux-resurrect
set -g @continuum-restore 'on'                # Enable auto-restore with tmux-continuum

# Initialize Tmux Plugin Manager (must stay at the bottom of the file)
run '~/.tmux/plugins/tpm/tpm'
